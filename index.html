<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ankit Study AI Assistant | D.Pharmacy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: 'Nunito', sans-serif;
    }
    #ankit-chat-wrapper {
      width: 100%;
      max-width: 620px;
      background: linear-gradient(135deg, #0f0c29cc, #302b63cc, #24243ecc);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #ankit-chat-header {
      background: linear-gradient(90deg, #4776e6, #8e54e9);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .robot-icon { font-size: 34px; animation: bounce 2s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    .header-text h2 { font-family:'Poppins',sans-serif; font-size:18px; color:white; font-weight:700; }
    .header-text p { font-size:12px; color:rgba(255,255,255,0.85); margin-top:2px; }
    #ankit-status-dot {
      width:9px; height:9px; background:#4ade80; border-radius:50%;
      display:inline-block; margin-right:5px; animation:pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .subjects-bar {
      background:rgba(0,0,0,0.25); padding:7px 20px;
      font-size:11px; color:rgba(255,255,255,0.45); text-align:center;
    }
    #ankit-chat-box {
      height:420px; overflow-y:auto; padding:20px;
      display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth;
    }
    #ankit-chat-box::-webkit-scrollbar { width:5px; }
    #ankit-chat-box::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:10px; }
    .ankit-msg {
      max-width:84%; padding:12px 16px; border-radius:16px;
      font-size:14px; line-height:1.75; animation:fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .ankit-msg.ai {
      background:rgba(255,255,255,0.09); color:#e2e8f0;
      border:1px solid rgba(255,255,255,0.12);
      align-self:flex-start; border-bottom-left-radius:4px;
    }
    .ankit-msg.user {
      background:linear-gradient(135deg,#4776e6,#8e54e9);
      color:white; align-self:flex-end; border-bottom-right-radius:4px;
    }
    .msg-label {
      font-size:11px; font-weight:700; margin-bottom:5px;
      opacity:0.65; text-transform:uppercase; letter-spacing:0.5px;
    }
    .typing-dots { display:flex; gap:5px; padding:4px 0; }
    .typing-dots span {
      width:8px; height:8px; background:rgba(255,255,255,0.45);
      border-radius:50%; animation:dot-bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2){animation-delay:0.2s}
    .typing-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes dot-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    #ankit-quick-btns { display:flex; flex-wrap:wrap; gap:7px; padding:4px 20px 12px; }
    .ankit-quick-btn {
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15);
      color:#c4b5fd; padding:6px 12px; border-radius:20px; font-size:12px;
      cursor:pointer; transition:all 0.2s; font-family:'Nunito',sans-serif;
    }
    .ankit-quick-btn:hover { background:rgba(142,84,233,0.35); border-color:#8e54e9; color:white; }
    #ankit-input-area {
      padding:14px 16px; background:rgba(0,0,0,0.3);
      display:flex; gap:10px; align-items:center;
      border-top:1px solid rgba(255,255,255,0.08);
    }
    #ankit-input {
      flex:1; background:rgba(255,255,255,0.09);
      border:1px solid rgba(255,255,255,0.18); color:white;
      padding:12px 16px; border-radius:25px; font-size:14px;
      outline:none; font-family:'Nunito',sans-serif;
    }
    #ankit-input::placeholder { color:rgba(255,255,255,0.35); }
    #ankit-input:focus { border-color:#8e54e9; }
    #ankit-send-btn {
      background:linear-gradient(135deg,#4776e6,#8e54e9);
      border:none; color:white; width:46px; height:46px;
      border-radius:50%; font-size:18px; cursor:pointer;
      transition:transform 0.2s; display:flex; align-items:center; justify-content:center;
    }
    #ankit-send-btn:hover { transform:scale(1.1); }
    #ankit-send-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
    .ankit-footer {
      text-align:center; padding:10px; font-size:11px;
      color:rgba(255,255,255,0.25); background:rgba(0,0,0,0.2);
    }
    .ankit-footer a { color:#818cf8; text-decoration:none; }
    @media(max-width:480px) {
      #ankit-chat-box { height:350px; }
      .ankit-msg { font-size:13px; }
    }
  </style>
</head>
<body>

<div id="ankit-chat-wrapper">

  <div id="ankit-chat-header">
    <div class="robot-icon">🤖</div>
    <div class="header-text">
      <h2>Ankit Study AI Assistant</h2>
      <p><span id="ankit-status-dot"></span>D.Pharmacy &bull; Powered by AI</p>
    </div>
  </div>

  <div class="subjects-bar">
    📚 Pharmaceutics &bull; Pharmacology &bull; Pharmacognosy &bull; Anatomy &bull; Social Pharmacy &bull; Pharm. Chemistry
  </div>

  <div id="ankit-chat-box"></div>

  <div id="ankit-quick-btns">
    <button class="ankit-quick-btn" onclick="ankitQuick('What are haematinics?')">💊 Haematinics</button>
    <button class="ankit-quick-btn" onclick="ankitQuick('Stages of tablet coating')">💊 Tablet Coating</button>
    <button class="ankit-quick-btn" onclick="ankitQuick('What is limit test?')">🧪 Limit Test</button>
    <button class="ankit-quick-btn" onclick="ankitQuick('Types of diuretics')">💉 Diuretics</button>
    <button class="ankit-quick-btn" onclick="ankitQuick('Antifungal drugs list')">🦠 Antifungals</button>
  </div>

  <div id="ankit-input-area">
    <input id="ankit-input" type="text" placeholder="D.Pharmacy ka koi bhi sawaal pucho..." />
    <button id="ankit-send-btn" onclick="ankitSend()">➤</button>
  </div>

  <div class="ankit-footer">
    Built for <a href="https://ankitstudypoint.blogspot.com" target="_blank">AnkitStudyPoint</a> &bull; D.Pharmacy Students
  </div>

</div>

<script>
(function () {

  // ✅ Vercel Proxy URL — API key chupi hai server pe
  var PROXY_URL = 'https://ankit-ai-proxy.vercel.app/api/chat';

  var chatHistory = [];
  var isLoading = false;

  var SYSTEM_PROMPT = "You are Ankit Study AI Assistant — a smart, friendly tutor for D.Pharmacy students in India. Subjects: Pharmaceutics, Pharmacology, Pharmacognosy, Human Anatomy & Physiology, Social Pharmacy, Pharmaceutical Chemistry. Answer in simple Hinglish or English. Give exam-focused bullet point answers. Bold key terms with **term**. Keep answers under 300 words.";

  // Welcome message
  setTimeout(function () {
    addMsg("Hello! 👋 Main hoon **Ankit Study AI** — tumhara D.Pharmacy exam helper!\n\nKoi bhi sawaal pucho — main yahan hoon! 📚\n\n💡 Neeche quick buttons bhi try karo!", false);
  }, 500);

  function addMsg(text, isUser) {
    var box = document.getElementById('ankit-chat-box');
    var div = document.createElement('div');
    div.className = 'ankit-msg ' + (isUser ? 'user' : 'ai');
    var label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = isUser ? '👤 Tum' : '🤖 AI';
    div.appendChild(label);
    var content = document.createElement('div');
    content.innerHTML = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    div.appendChild(content);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function addTyping() {
    var box = document.getElementById('ankit-chat-box');
    var div = document.createElement('div');
    div.className = 'ankit-msg ai';
    div.id = 'ankit-typing';
    var label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = '🤖 AI soch raha hai...';
    div.appendChild(label);
    var dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(dots);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function removeTyping() {
    var t = document.getElementById('ankit-typing');
    if (t) t.remove();
  }

  async function callAI(userMsg) {
    var messages = [{ role: 'system', content: SYSTEM_PROMPT }];
    var recent = chatHistory.slice(-8);
    for (var i = 0; i < recent.length; i++) messages.push(recent[i]);
    messages.push({ role: 'user', content: userMsg });

    var response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openrouter/auto',
        messages: messages,
        max_tokens: 800,
        temperature: 0.7
      })
    });

    var data = await response.json();
    if (!response.ok) {
      var errMsg = (data.error && data.error.message) ? data.error.message : 'Server error';
      throw new Error(errMsg);
    }
    if (!data.choices || !data.choices[0]) {
      throw new Error('Response nahi mila — dobara try karo');
    }
    return data.choices[0].message.content;
  }

  window.ankitSend = async function () {
    if (isLoading) return;
    var input = document.getElementById('ankit-input');
    var msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    isLoading = true;
    document.getElementById('ankit-send-btn').disabled = true;
    addMsg(msg, true);
    addTyping();
    try {
      var reply = await callAI(msg);
      removeTyping();
      addMsg(reply, false);
      chatHistory.push({ role: 'user', content: msg });
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 16) chatHistory = chatHistory.slice(-16);
    } catch (e) {
      removeTyping();
      addMsg('❌ Error: ' + e.message + '\n\n💡 Page reload karo aur dobara try karo.', false);
    }
    isLoading = false;
    document.getElementById('ankit-send-btn').disabled = false;
    input.focus();
  };

  window.ankitQuick = function (q) {
    document.getElementById('ankit-input').value = q;
    ankitSend();
  };

  document.getElementById('ankit-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') ankitSend();
  });

})();
</script>

</body>
</html>
